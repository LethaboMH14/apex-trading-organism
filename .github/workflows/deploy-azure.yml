# GitHub Secrets Required for this workflow:
# - AZURE_CREDENTIALS: Azure service principal credentials (JSON format)
# - AZURE_OPENAI_API_KEY: Azure OpenAI API key
# - AZURE_OPENAI_ENDPOINT: Azure OpenAI endpoint URL
# - AZURE_COSMOS_CONNECTION_STRING: Azure Cosmos DB connection string
# - SEPOLIA_RPC_URL: Ethereum Sepolia RPC URL
# - APEX_PRIVATE_KEY: APEX private key for signing transactions
# - APEX_AGENT_ID: APEX agent ID (e.g., "26")

name: Deploy to Azure Container Apps

on:
  push:
    branches:
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      
      - name: Build and push Docker image to Azure Container Registry
        run: |
          cd apex
          az acr login --name apexregistry
          docker build -t apexregistry.azurecr.io/apex:latest .
          docker push apexregistry.azurecr.io/apex:latest
      
      - name: Deploy apex-ws Container App
        run: |
          az containerapp update \
            --name apex-ws \
            --resource-group precision-pad-rg \
            --image apexregistry.azurecr.io/apex:latest \
            --environment-vars \
              AZURE_OPENAI_API_KEY=${{ secrets.AZURE_OPENAI_API_KEY }} \
              AZURE_OPENAI_ENDPOINT=${{ secrets.AZURE_OPENAI_ENDPOINT }} \
              AZURE_COSMOS_CONNECTION_STRING=${{ secrets.AZURE_COSMOS_CONNECTION_STRING }} \
              SEPOLIA_RPC_URL=${{ secrets.SEPOLIA_RPC_URL }} \
              APEX_PRIVATE_KEY=${{ secrets.APEX_PRIVATE_KEY }} \
              APEX_AGENT_ID=${{ secrets.APEX_AGENT_ID }} \
            --command "python apex_ws.py" \
            --ingress external \
            --target-port 8766
      
      - name: Deploy apex-indexer Container App
        run: |
          az containerapp update \
            --name apex-indexer \
            --resource-group precision-pad-rg \
            --image apexregistry.azurecr.io/apex:latest \
            --environment-vars \
              AZURE_OPENAI_API_KEY=${{ secrets.AZURE_OPENAI_API_KEY }} \
              AZURE_OPENAI_ENDPOINT=${{ secrets.AZURE_OPENAI_ENDPOINT }} \
              AZURE_COSMOS_CONNECTION_STRING=${{ secrets.AZURE_COSMOS_CONNECTION_STRING }} \
              SEPOLIA_RPC_URL=${{ secrets.SEPOLIA_RPC_URL }} \
              APEX_PRIVATE_KEY=${{ secrets.APEX_PRIVATE_KEY }} \
              APEX_AGENT_ID=${{ secrets.APEX_AGENT_ID }} \
            --command "python apex_indexer.py" \
            --ingress internal
      
      - name: Deploy apex-risk-api Container App
        run: |
          az containerapp update \
            --name apex-risk-api \
            --resource-group precision-pad-rg \
            --image apexregistry.azurecr.io/apex:latest \
            --environment-vars \
              AZURE_OPENAI_API_KEY=${{ secrets.AZURE_OPENAI_API_KEY }} \
              AZURE_OPENAI_ENDPOINT=${{ secrets.AZURE_OPENAI_ENDPOINT }} \
              AZURE_COSMOS_CONNECTION_STRING=${{ secrets.AZURE_COSMOS_CONNECTION_STRING }} \
              SEPOLIA_RPC_URL=${{ secrets.SEPOLIA_RPC_URL }} \
              APEX_PRIVATE_KEY=${{ secrets.APEX_PRIVATE_KEY }} \
              APEX_AGENT_ID=${{ secrets.APEX_AGENT_ID }} \
            --command "uvicorn apex.api.risk_api:app --host 0.0.0.0 --port 3002" \
            --ingress external \
            --target-port 3002
