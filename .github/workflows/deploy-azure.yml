# GitHub Secrets Required for this workflow:
# - AZURE_CREDENTIALS: Azure service principal credentials (JSON format)
# - AZURE_OPENAI_API_KEY: Azure OpenAI API key
# - AZURE_OPENAI_ENDPOINT: Azure OpenAI endpoint URL
# - AZURE_COSMOS_CONNECTION_STRING: Azure Cosmos DB connection string
# - SEPOLIA_RPC_URL: Ethereum Sepolia RPC URL
# - APEX_PRIVATE_KEY: APEX private key for signing transactions
# - APEX_AGENT_ID: APEX agent ID (e.g., "26")

name: Deploy to Azure Container Apps

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      
      - name: Build and push Docker image to Azure Container Registry
        run: |
          cd apex
          az acr login --name apexregistry14
          docker build -t apexregistry14.azurecr.io/apex:${{ github.sha }} .
          docker push apexregistry14.azurecr.io/apex:${{ github.sha }}
      
      - name: Get ACR credentials
        run: |
          echo "ACR_USERNAME=$(az acr credential show --name apexregistry14 --query username -o tsv)" >> $GITHUB_ENV
          echo "ACR_PASSWORD=$(az acr credential show --name apexregistry14 --query passwords[0].value -o tsv)" >> $GITHUB_ENV

      - name: Deploy apex-ws Container App
        run: |
          az containerapp create \
            --name apex-ws \
            --resource-group precision-pad-rg \
            --environment apex-env \
            --image apexregistry14.azurecr.io/apex:${{ github.sha }} \
            --target-port 8766 \
            --ingress external \
            --registry-server apexregistry14.azurecr.io \
            --registry-username ${{ env.ACR_USERNAME }} \
            --registry-password ${{ env.ACR_PASSWORD }} \
            --env-vars AZURE_OPENAI_API_KEY="${{ secrets.AZURE_OPENAI_API_KEY }}" AZURE_OPENAI_ENDPOINT="${{ secrets.AZURE_OPENAI_ENDPOINT }}" APEX_PRIVATE_KEY="${{ secrets.APEX_PRIVATE_KEY }}" APEX_AGENT_ID="${{ secrets.APEX_AGENT_ID }}"

      - name: Deploy apex-indexer Container App
        run: |
          az containerapp create \
            --name apex-indexer \
            --resource-group precision-pad-rg \
            --environment apex-env \
            --image apexregistry14.azurecr.io/apex:${{ github.sha }} \
            --registry-server apexregistry14.azurecr.io \
            --registry-username ${{ env.ACR_USERNAME }} \
            --registry-password ${{ env.ACR_PASSWORD }} \
            --env-vars AZURE_COSMOS_CONNECTION_STRING="${{ secrets.AZURE_COSMOS_CONNECTION_STRING }}" APEX_PRIVATE_KEY="${{ secrets.APEX_PRIVATE_KEY }}" APEX_AGENT_ID="${{ secrets.APEX_AGENT_ID }}"

      - name: Deploy apex-risk-api Container App
        run: |
          az containerapp create \
            --name apex-risk-api \
            --resource-group precision-pad-rg \
            --environment apex-env \
            --image apexregistry14.azurecr.io/apex:${{ github.sha }} \
            --target-port 3002 \
            --ingress external \
            --registry-server apexregistry14.azurecr.io \
            --registry-username ${{ env.ACR_USERNAME }} \
            --registry-password ${{ env.ACR_PASSWORD }} \
            --env-vars AZURE_OPENAI_API_KEY="${{ secrets.AZURE_OPENAI_API_KEY }}" APEX_PRIVATE_KEY="${{ secrets.APEX_PRIVATE_KEY }}" APEX_AGENT_ID="${{ secrets.APEX_AGENT_ID }}"
